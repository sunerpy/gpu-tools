[remote.github]
owner = "sunerpy"
repo = "gpu-tools"

[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""

body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}

    ### {{ group | striptags | trim | upper_first }}

    {% for commit in commits %}\
        - {% if commit.scope %}**{{ commit.scope }}**: {% endif %}\
            {% if commit.breaking %}[**BREAKING**] {% endif %}\
            {{ commit.message | upper_first | trim }}\
            {% if commit.github.pr_number %} \
                ([#{{ commit.github.pr_number }}](https://github.com/sunerpy/gpu-tools/pull/{{ commit.github.pr_number }}))\
            {% endif %}
        {% if commit.body %}\
{{ commit.body | trim | indent(prefix="      ") }}
        {% endif %}\
    {% endfor %}
{% endfor %}
"""

footer = """
---
*Generated by [git-cliff](https://github.com/orhun/git-cliff)*
"""

trim = true

postprocessors = [{ pattern = '<REPO>', replace = "https://github.com/sunerpy/gpu-tools" }]

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false

commit_preprocessors = [
  { pattern = '\(#([0-9]+)\)', replace = "([#${1}](https://github.com/sunerpy/gpu-tools/issues/${1}))" },
  { pattern = '  +', replace = " " },
]

commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^doc", group = "Documentation" },
  { message = "^docs", group = "Documentation" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactor" },
  { message = "^style", group = "Styling" },
  { message = "^test", group = "Testing" },
  { message = "^build", group = "Build" },
  { message = "^ci", group = "CI/CD" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore\\(changelog\\)", skip = true },
  { message = "^chore: (release|bump|update changelog)", skip = true },
  { message = "^deps\\(go\\)", group = "Dependencies (Go)" },
  { message = "^deps", group = "Dependencies" },
  { message = "^chore\\(deps\\)", group = "Dependencies" },
  { message = "^chore\\(deps-dev\\)", group = "Dependencies" },
  { message = "^chore", group = "Miscellaneous" },
  { body = ".*security", group = "Security" },
  { message = "^revert", group = "Revert" },
]

filter_commits = false

tag_pattern = "v[0-9].*"

skip_tags = "v0.0.0"

ignore_tags = ""

sort_commits = "oldest"

topo_order = false

link_parsers = [
  { pattern = "#(\\d+)", href = "https://github.com/sunerpy/gpu-tools/issues/$1" },
  { pattern = "RFC(\\d+)", href = "https://datatracker.ietf.org/doc/html/rfc$1" },
]

[bump]
features_always_bump_minor = true
breaking_always_bump_major = true
initial_tag = "0.1.0"
