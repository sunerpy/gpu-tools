name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)build and release, e.g. v1.0.0. Leave blank to run release-please only."
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write
  actions: read # verify-ci's `gh api` reads the CI workflow's runs + jobs

jobs:
  release-please:
    name: Release Please
    if: github.event_name != 'workflow_dispatch' || inputs.tag == ''
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      pr: ${{ steps.release.outputs.pr }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # verify-ci: gate the PUBLIC release on the SAME tag commit's CI result.
  # Query-only (no go build/test re-run) — it polls the CI workflow's push run
  # for the tag commit SHA and waits for its `CI Success` gate job. Runs in
  # PARALLEL with build-and-release; the gate is enforced at publish-release
  # (below), so a red CI blocks publish while the build overlaps the CI wait.
  #
  # It must always RUN (never be skipped) because publish-release lists it in
  # `needs` — a skipped needed job cascade-skips publish-release. Hence the SAME
  # gate as build-and-release, plus a workflow_dispatch run-and-pass no-op
  # (a manual re-attach has no new CI run to check).
  verify-ci:
    name: Verify CI Passed
    needs: release-please
    if: |
      always() &&
      (
        (github.event_name == 'workflow_dispatch' && inputs.tag != '') ||
        needs.release-please.outputs.release_created == 'true'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
    env:
      TAG_NAME: ${{ github.event.inputs.tag != '' && github.event.inputs.tag || needs.release-please.outputs.tag_name }}
    steps:
      - name: Manual re-attach — skip CI gate (run-and-pass no-op)
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "manual re-attach: skipping CI verification"

      - name: Wait for CI Success on the tag commit
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Resolve the cut tag's commit SHA (query-only; no checkout needed).
          head_sha=$(gh api "repos/${REPO}/commits/${TAG_NAME}" --jq '.sha')
          if [ -z "${head_sha}" ]; then
            echo "could not resolve commit SHA for tag ${TAG_NAME}; leaving release as draft." >&2
            exit 1
          fi
          echo "Gating release on CI Success for ${TAG_NAME} (${head_sha})."

          max_iters=40   # ~10 min at 15s/iter
          sleep_secs=15

          # Locate the CI workflow's push run on main for this exact SHA.
          run_id=""
          for i in $(seq 1 "${max_iters}"); do
            run_id=$(gh api \
              "repos/${REPO}/actions/runs?head_sha=${head_sha}&event=push&branch=main&per_page=100" \
              --jq '[.workflow_runs[] | select(.name == "CI")] | sort_by(.created_at) | last | .id // empty')
            if [ -n "${run_id}" ]; then
              echo "Found CI run ${run_id} for ${head_sha}"
              break
            fi
            echo "No CI run for ${head_sha} yet (${i}/${max_iters}); sleeping ${sleep_secs}s..."
            sleep "${sleep_secs}"
          done
          if [ -z "${run_id}" ]; then
            echo "Timed out waiting for a CI run; leaving release as draft." >&2
            exit 1
          fi

          # Wait for the `CI Success` gate JOB to conclude; fail-closed on
          # anything that is not a clean success or on timeout.
          for i in $(seq 1 "${max_iters}"); do
            status=$(gh api "repos/${REPO}/actions/runs/${run_id}/jobs?per_page=100" \
              --jq '.jobs[] | select(.name == "CI Success") | .status')
            conclusion=$(gh api "repos/${REPO}/actions/runs/${run_id}/jobs?per_page=100" \
              --jq '.jobs[] | select(.name == "CI Success") | .conclusion // ""')
            if [ -z "${status}" ] || [ "${status}" != "completed" ]; then
              echo "CI Success not done (status='${status}', ${i}/${max_iters}); sleeping ${sleep_secs}s..."
              sleep "${sleep_secs}"
              continue
            fi
            if [ "${conclusion}" = "success" ]; then
              echo "CI Success passed for ${head_sha}."
              exit 0
            fi
            echo "CI Success concluded '${conclusion}'; blocking release (draft preserved)." >&2
            exit 1
          done
          echo "Timed out waiting for CI Success to complete; leaving release as draft." >&2
          exit 1

  build-and-release:
    name: Build and Release
    needs: release-please
    # Run when release-please cut a release, OR when manually dispatched with a tag.
    if: |
      always() &&
      (
        (github.event_name == 'workflow_dispatch' && inputs.tag != '') ||
        needs.release-please.outputs.release_created == 'true'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TAG_NAME: ${{ github.event.inputs.tag != '' && github.event.inputs.tag || needs.release-please.outputs.tag_name }}

    steps:
      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          ref: ${{ env.TAG_NAME }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Generate release notes with git-cliff
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: ${{ runner.temp }}/RELEASE_CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean --release-notes=${{ runner.temp }}/RELEASE_CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-release:
    name: Publish Release
    # verify-ci is the release GATE: a red CI blocks this job, so the built
    # assets stay on a DRAFT release (visible + fixable) and never go public.
    needs: [release-please, build-and-release, verify-ci]
    if: |
      always() &&
      (
        (github.event_name == 'workflow_dispatch' && inputs.tag != '') ||
        needs.release-please.outputs.release_created == 'true'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TAG_NAME: ${{ github.event.inputs.tag != '' && github.event.inputs.tag || needs.release-please.outputs.tag_name }}
    steps:
      - name: Publish completed draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # release-please and GoReleaser can each leave a draft release on the
          # same tag (GoReleaser can't locate release-please's draft by tag via
          # the API, so it creates its own). Publish the one that actually holds
          # the built assets and delete any empty duplicate draft on this tag.
          asset_id=""
          empty_ids=""
          while read -r id count; do
            if [ "${count}" -gt 0 ] && [ -z "${asset_id}" ]; then
              asset_id="${id}"
            else
              empty_ids="${empty_ids} ${id}"
            fi
          done < <(gh api "repos/${GITHUB_REPOSITORY}/releases" \
                     --jq ".[] | select(.tag_name==\"${TAG_NAME}\") | \"\(.id) \(.assets|length)\"")

          if [ -z "${asset_id}" ]; then
            echo "no release with assets found for ${TAG_NAME}" >&2
            exit 1
          fi

          for id in ${empty_ids}; do
            echo "deleting empty duplicate draft release ${id} for ${TAG_NAME}"
            gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/${id}"
          done

          echo "publishing release ${asset_id} for ${TAG_NAME}"
          gh api -X PATCH "repos/${GITHUB_REPOSITORY}/releases/${asset_id}" \
            -F draft=false -F make_latest=true --jq '{id:.id,draft:.draft,tag:.tag_name}'
