name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)build and release, e.g. v1.0.0. Leave blank to run release-please only."
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    if: github.event_name != 'workflow_dispatch' || inputs.tag == ''
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      pr: ${{ steps.release.outputs.pr }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-and-release:
    name: Build and Release
    needs: release-please
    # Run when release-please cut a release, OR when manually dispatched with a tag.
    if: |
      always() &&
      (
        (github.event_name == 'workflow_dispatch' && inputs.tag != '') ||
        needs.release-please.outputs.release_created == 'true'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TAG_NAME: ${{ github.event.inputs.tag != '' && github.event.inputs.tag || needs.release-please.outputs.tag_name }}

    steps:
      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          ref: ${{ env.TAG_NAME }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Generate release notes with git-cliff
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: ${{ runner.temp }}/RELEASE_CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean --release-notes=${{ runner.temp }}/RELEASE_CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish completed draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # release-please and GoReleaser can each leave a draft release on the
          # same tag (GoReleaser can't locate release-please's draft by tag via
          # the API, so it creates its own). Publish the one that actually holds
          # the built assets and delete any empty duplicate draft on this tag.
          asset_id=""
          empty_ids=""
          while read -r id count; do
            if [ "${count}" -gt 0 ] && [ -z "${asset_id}" ]; then
              asset_id="${id}"
            else
              empty_ids="${empty_ids} ${id}"
            fi
          done < <(gh api "repos/${GITHUB_REPOSITORY}/releases" \
                     --jq ".[] | select(.tag_name==\"${TAG_NAME}\") | \"\(.id) \(.assets|length)\"")

          if [ -z "${asset_id}" ]; then
            echo "no release with assets found for ${TAG_NAME}" >&2
            exit 1
          fi

          for id in ${empty_ids}; do
            echo "deleting empty duplicate draft release ${id} for ${TAG_NAME}"
            gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/${id}"
          done

          echo "publishing release ${asset_id} for ${TAG_NAME}"
          gh api -X PATCH "repos/${GITHUB_REPOSITORY}/releases/${asset_id}" \
            -F draft=false -F make_latest=true --jq '{id:.id,draft:.draft,tag:.tag_name}'
