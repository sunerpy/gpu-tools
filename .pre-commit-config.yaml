repos:
  - repo: local
    hooks:
      - id: fmt
        name: fmt
        entry: make fmt
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: lint
        name: lint
        entry: make lint
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: test
        name: test
        entry: make test
        language: system
        pass_filenames: false
        stages: [pre-push]
